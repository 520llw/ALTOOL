# =====================================================
# 功率器件参数提取系统 - 全局配置文件
# 修改后无需重启，系统会自动加载最新配置
# =====================================================

# 界面相关配置
ui:
  # 主题色（十六进制颜色值）
  primary_color: "#1E3A8A"
  # 次要色
  secondary_color: "#3B82F6"
  # 成功色
  success_color: "#10B981"
  # 警告色
  warning_color: "#F59E0B"
  # 错误色
  error_color: "#EF4444"
  # 默认分页条数
  default_page_size: 20
  # 最大分页条数
  max_page_size: 50

# 性能相关配置
performance:
  # PDF解析并发进程数
  parse_workers: 4
  # AI调用超时时间(秒)
  ai_timeout: 60
  # AI调用最大重试次数
  ai_max_retries: 3
  # 缓存有效期(小时)
  cache_ttl_hours: 24
  # 大文件阈值(MB)，超过此大小使用流式读取
  large_file_threshold_mb: 50
  # 批量写入Excel时的分块大小
  excel_chunk_size: 1000
  # 是否启用MD5校验避免重复解析
  enable_md5_check: true
  # 是否启用结果缓存
  enable_cache: true

# 安全相关配置
security:
  # 登录失败锁定次数
  max_login_attempts: 5
  # 账号锁定时间(分钟)
  lockout_duration_minutes: 10
  # 登录态有效期(天) - 勾选"记住我"时
  session_duration_days: 7
  # 密码最小长度
  password_min_length: 6
  # 是否要求密码包含字母和数字
  password_require_alphanumeric: true
  # 是否记录登录IP
  log_login_ip: true

# AI模型配置
ai:
  # 默认AI提供商 (deepseek/openai/local)
  default_provider: "deepseek"
  # 默认模型
  default_model: "deepseek-chat"
  # 默认API密钥（用户未配置时使用）
  # 建议通过环境变量 AI_API_KEY 设置，留空则要求用户自行配置
  default_api_key: "${AI_API_KEY}"
  # 温度参数（0-1，越低越稳定）
  temperature: 0
  # 最大token数（DeepSeek最大支持8192）
  max_tokens: 8192

# 文件路径配置
paths:
  # 数据目录
  data_dir: "./data"
  # 上传文件目录
  upload_dir: "./data/uploads"
  # 输出表格目录
  output_dir: "./data/output"
  # 日志目录
  log_dir: "./logs"
  # 备份目录
  backup_dir: "./backup"
  # 缓存目录
  cache_dir: "./cache"

# 日志配置
logging:
  # 日志级别 (DEBUG/INFO/WARNING/ERROR)
  level: "INFO"
  # 日志保留天数
  retention_days: 30
  # 单个日志文件最大大小(MB)
  max_file_size_mb: 10
  # 是否输出到控制台
  console_output: true

# 备份配置
backup:
  # 是否启用自动备份
  auto_backup: true
  # 自动备份时间（每周几，0=周日，1=周一...）
  backup_day: 0
  # 自动备份时间（小时）
  backup_hour: 2
  # 保留备份数量
  max_backups: 3

# 器件类型配置
device_types:
  - name: "Si MOSFET"
    icon: "⚡"
    color: "#3B82F6"
  - name: "SiC MOSFET"
    icon: "🔥"
    color: "#EF4444"
  - name: "IGBT"
    icon: "🔌"
    color: "#10B981"

# 参数提取优化配置
extraction:
  # 高优先级参数（优先匹配）
  high_priority_params:
    - "VDS"
    - "Ron 10V_type"
    - "Ron 10V_max"
    - "ID Tc=25℃"
    - "Qg"
  # 数值格式规则
  value_format_rules:
    # 电流保留小数位数
    current_decimals: 1
    # 电阻单位统一为mΩ
    resistance_unit: "mΩ"
    # 电容单位统一为pF
    capacitance_unit: "pF"
    # 电荷单位统一为nC
    charge_unit: "nC"

